<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Sort</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

    <div id="settings-btn" onclick="toggleSettings()">⚙️</div>

    <div id="settings-panel" class="hidden">
        <div class="settings-box">
            <h3>Options</h3>

            <div class="option">
                <span>Sound</span>
                <button onclick="toggleSound()" id="sound-toggle">ON</button>
            </div>

            <button onclick="toggleSettings()">Close</button>
        </div>
    </div>

    <div id="game">
        <div id="menu">
            <div id="menu-heading"> Liquid Sort Game</div>
            <div class="lvl" id="easy" onclick="OpenLevel(0);">Easy</div>
            <div class="lvl" id="medium" onclick="OpenLevel(1);">Medium</div>
            <div class="lvl" id="hard" onclick="OpenLevel(2);">Hard</div>
            <div class="lvl" id="very-hard" onclick="OpenLevel(3);">Very Hard</div>
            <div class="lvl" id="impossible" onclick="OpenLevel(7);">Impossible</div>
            <br><br><br>
            <div id="rules-btn" onclick="ShowRules();">Rules</div>
        </div>

        <div id="level"></div>

        <div id="rules-page">
            <div id="rules">
                <div id="rules-heading">
                    Rules
                </div>
                <div id="rules-text">
                    <ul>
                        <li>Chỉ rót khi cùng màu hoặc ống trống</li>
                        <li>Mỗi ống tối đa 4 lớp</li>
                        <li>Mục tiêu: mỗi ống 1 màu</li>
                    </ul>
                </div>
                <div id="back" onclick="HideRules();">
                    Back
                </div>
            </div>
        </div>

    </div>

    <audio id="pourSound" src="pour.mp3"></audio>
    <audio id="winSound" src="win.mp3"></audio>

    <div id="popup-confirm" class="popup">
        <div class="popup-box">
            <p id="popup-text">Bạn có chắc?</p>
            <div class="popup-actions">
                <button onclick="confirmYes()">YES</button>
                <button onclick="confirmNo()">NO</button>
            </div>
        </div>
    </div>

</body>

<script type="text/javascript" src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</html>
